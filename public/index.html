<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Lernin</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#F3F8F4" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0F1810" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app"></div>

  <script type="module" src="/app.js"></script>
  <script>
    // Service worker registration lives here, not inside app.js, so it
    // still runs even if a future app.js refactor changes its own load
    // order — this line has one job.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.error('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
